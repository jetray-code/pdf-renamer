<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PDF Smart Renamer</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://unpkg.com/tesseract.js@5.0.3/dist/tesseract.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { indigo: { 600: '#4f46e5', 700: '#4338ca' }, slate: { 950: '#0f172a' } } } } }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; overflow: hidden; }
        @media (max-width: 768px) { body { overflow: auto; } }
        .glass { backdrop-filter: blur(12px); }
        .modal-overlay { background: rgba(0, 0, 0, 0.75); backdrop-filter: blur(8px); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #334155; }
        .preview-glow { box-shadow: 0 0 40px -10px rgba(99, 102, 241, 0.3); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 transition-colors duration-300 font-medium text-sm">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const SettingsModal = ({ isOpen, onClose, config, setConfig }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[100] modal-overlay flex items-center justify-center p-4 animate-in fade-in duration-200">
                    <div className="bg-white dark:bg-slate-900 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-slate-100 dark:border-slate-800 overflow-hidden animate-in zoom-in-95 duration-200">
                        <div className="p-8 border-b border-slate-50 dark:border-slate-800 flex justify-between items-center">
                            <h2 className="text-xl font-black tracking-tight">Preferences</h2>
                            <button onClick={onClose} className="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-all">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                            </button>
                        </div>
                        <div className="p-8 space-y-8">
                            <div>
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-4">Appearance</label>
                                <div className="grid grid-cols-3 gap-2 bg-slate-50 dark:bg-slate-800/50 p-1.5 rounded-2xl border border-slate-100 dark:border-slate-800">
                                    {['light', 'dark', 'system'].map(m => (
                                        <button key={m} onClick={() => setConfig({ ...config, theme: m })} className={`py-2 rounded-xl text-[10px] font-black uppercase transition-all ${config.theme === m ? 'bg-white dark:bg-slate-600 shadow-lg text-indigo-600 dark:text-white' : 'text-slate-400 hover:text-slate-600'}`}>{m}</button>
                                    ))}
                                </div>
                            </div>
                            <div>
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-4">Naming Convention</label>
                                <div className="space-y-2">
                                    {[
                                        { id: 'title', label: 'Title Case', base: 'Aseptic Processing' },
                                        { id: 'caps', label: 'ALL CAPS', base: 'ASEPTIC PROCESSING' },
                                        { id: 'small', label: 'all small', base: 'aseptic processing' }
                                    ].map(opt => {
                                        const example = opt.base.replace(/\s/g, config.separator) + ".pdf";
                                        return (
                                            <button key={opt.id} onClick={() => setConfig({ ...config, naming: opt.id })} className={`w-full flex justify-between items-center p-4 rounded-2xl border transition-all ${config.naming === opt.id ? 'border-indigo-600 bg-indigo-50/50 dark:bg-indigo-900/10 text-indigo-600' : 'border-slate-100 dark:border-slate-800 hover:border-indigo-200'}`}>
                                                <span className="text-sm font-bold">{opt.label}</span>
                                                <span className="text-[10px] font-medium opacity-60 italic">{example}</span>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                            <div>
                                <label className="text-[10px] font-black text-slate-400 uppercase tracking-widest block mb-4">Word Separator</label>
                                <div className="flex gap-4">
                                    {[{ id: ' ', label: 'Space' }, { id: '_', label: 'Underscore' }, { id: '-', label: 'Hyphen' }].map(sep => (
                                        <button key={sep.id} onClick={() => setConfig({ ...config, separator: sep.id })} className={`flex-1 py-3 rounded-2xl border text-sm font-bold transition-all ${config.separator === sep.id ? 'border-indigo-600 bg-indigo-600 text-white shadow-lg' : 'border-slate-100 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800'}`}>{sep.label}</button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const FullscreenPreview = ({ isOpen, path, onClose }) => {
            useEffect(() => {
                const handleEsc = (e) => { if (e.key === 'Escape') onClose(); };
                if (isOpen) window.addEventListener('keydown', handleEsc);
                return () => window.removeEventListener('keydown', handleEsc);
            }, [isOpen]);
            if (!isOpen || !path) return null;
            return (
                <div onClick={onClose} className="fixed inset-0 z-[110] modal-overlay flex items-center justify-center p-4 md:p-12 animate-in fade-in duration-300">
                    <div className="bg-white p-2 rounded-3xl w-full h-full max-w-6xl overflow-hidden relative shadow-2xl ring-4 ring-white/20">
                        <iframe src={path} className="w-full h-full rounded-2xl border-0" />
                        <button className="absolute top-6 right-6 bg-slate-900/40 hover:bg-slate-900 p-3 rounded-full text-white backdrop-blur-md transition-all shadow-xl">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                        </button>
                    </div>
                </div>
            );
        };

        const ConfirmModal = ({ isOpen, files, saveLog, setSaveLog, onConfirm, onCancel }) => {
            useEffect(() => {
                const handleEsc = (e) => { if (e.key === 'Escape') onCancel(); };
                if (isOpen) window.addEventListener('keydown', handleEsc);
                return () => window.removeEventListener('keydown', handleEsc);
            }, [isOpen]);
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[80] flex items-center justify-center p-4 modal-overlay animate-in fade-in duration-200">
                    <div className="bg-white dark:bg-slate-900 rounded-[3rem] shadow-2xl w-full max-w-2xl flex flex-col max-h-[85vh] border border-slate-100 dark:border-slate-800 overflow-hidden">
                        <div className="p-8 border-b border-slate-100 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-800/50 text-center md:text-left">
                            <h2 className="text-2xl font-black tracking-tight">Confirm Changes</h2>
                            <p className="text-slate-500 text-sm font-medium mt-1">Reviewing {files.length} planned renames.</p>
                        </div>
                        <div className="flex-1 overflow-y-auto p-4 md:p-8 space-y-4">
                            {files.map((f, i) => (
                                <div key={i} className="p-4 bg-slate-50 dark:bg-slate-800/30 rounded-2xl border border-slate-100 dark:border-slate-800 flex flex-col md:flex-row md:justify-between items-start md:items-center gap-2">
                                    <p className="text-[10px] font-black text-slate-400 truncate max-w-[200px] uppercase tracking-widest">{f.name}</p>
                                    <p className="text-sm font-black text-indigo-600 truncate">{f.detected_title}.pdf</p>
                                </div>
                            ))}
                        </div>
                        <div className="p-8 border-t border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-800/30">
                            <label className="flex items-center gap-4 cursor-pointer group mb-8 p-5 bg-white dark:bg-slate-900 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-sm transition-all hover:border-indigo-200">
                                <input type="checkbox" checked={saveLog} onChange={e => setSaveLog(e.target.checked)} className="w-6 h-6 rounded-lg border-slate-300 text-indigo-600 focus:ring-indigo-500" />
                                <div className="flex flex-col">
                                    <span className="text-sm font-black tracking-tight">Save Session Audit Log</span>
                                    <span className="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">Creates a .txt file in your folder with rename history</span>
                                </div>
                            </label>
                            <div className="flex gap-4">
                                <button onClick={onCancel} className="flex-1 py-4 rounded-2xl text-sm font-bold text-slate-400 hover:bg-slate-100 transition-all">Cancel</button>
                                <button onClick={onConfirm} className="flex-2 px-8 md:px-12 py-4 rounded-2xl text-sm font-black bg-indigo-600 text-white hover:bg-indigo-700 shadow-xl shadow-indigo-100 transition-all active:scale-95">Execute Batch Rename</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [isSupported] = useState('showDirectoryPicker' in window);
            if (!isSupported) {
                return (
                    <div className="h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-950 p-6 text-center">
                        <div className="max-w-md bg-white dark:bg-slate-900 p-10 rounded-[3rem] shadow-2xl border border-red-100 dark:border-red-900/30">
                            <div className="bg-red-50 dark:bg-red-900/20 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6 text-red-500 text-2xl font-black">!</div>
                            <h2 className="text-2xl font-black mb-4 tracking-tight">Unsupported Browser</h2>
                            <p className="text-slate-500 dark:text-slate-400 text-sm leading-relaxed mb-8">Direct file renaming requires Chrome or Edge. Please switch browsers to use this tool.</p>
                        </div>
                    </div>
                );
            }

            const [dirHandle, setDirHandle] = useState(null);
            const [files, setFiles] = useState([]);
            const [selectedPaths, setSelectedPaths] = useState(new Set());
            const [status, setStatus] = useState('Ready');
            const [previewUrl, setPreviewPath] = useState(null);
            const [isSidebarOpen, setIsSidebarOpen] = useState(false);
            const [activeModal, setActiveModal] = useState(null);
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [recentFolders, setRecentFolders] = useState([]);
            const [saveLog, setSaveLog] = useState(true);
            const [config, setConfig] = useState(() => {
                const saved = localStorage.getItem('appConfig');
                return saved ? JSON.parse(saved) : { theme: 'system', naming: 'title', separator: ' ' };
            });

            const selectedFiles = useMemo(() => files.filter(f => selectedPaths.has(f.name) && f.status !== 'Done'), [files, selectedPaths]);

            useEffect(() => {
                if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');
                window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); setDeferredPrompt(e); });
                const savedHistory = localStorage.getItem('recentPDFPaths');
                if (savedHistory) setRecentFolders(JSON.parse(savedHistory).map(n => ({ name: n, handle: null })));
                applyTheme(config.theme);
                localStorage.setItem('appConfig', JSON.stringify(config));
                if (files.length > 0) setFiles(prev => prev.map(f => ({...f, detected_title: formatTitle(f.detected_title)})));
            }, [config]);

            const applyTheme = (mode) => {
                const root = window.document.documentElement;
                if (mode === 'dark') root.classList.add('dark');
                else if (mode === 'light') root.classList.remove('dark');
                else root.classList.toggle('dark', window.matchMedia('(prefers-color-scheme: dark)').matches);
            };

            const formatTitle = (txt) => {
                if (!txt) return txt;
                let clean = txt.replace(/[-_]/g, ' ').replace(/\s+/g, ' ').trim();
                if (config.naming === 'caps') clean = clean.toUpperCase();
                else if (config.naming === 'small') clean = clean.toLowerCase();
                else clean = clean.split(' ').map(w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(' ');
                return clean.replace(/\s/g, config.separator);
            };

            const addToRecent = (name) => {
                const updated = [name, ...recentFolders.map(f => f.name).filter(n => n !== name)].slice(0, 5);
                localStorage.setItem('recentPDFPaths', JSON.stringify(updated));
                setRecentFolders(updated.map(n => ({ name: n, handle: null })));
            };

            const scanHandle = async (handle) => {
                setDirHandle(handle);
                setFiles([]); setSelectedPaths(new Set()); setStatus('Scanning...');
                const list = [];
                for await (const entry of handle.values()) {
                    if (entry.kind === 'file' && entry.name.toLowerCase().endsWith('.pdf')) {
                        const file = await entry.getFile();
                        const candidates = await extractTitles(file);
                        list.push({ handle: entry, name: entry.name, candidates, detected_title: formatTitle(candidates[0]?.text || entry.name.replace('.pdf', '')), status: 'Pending' });
                    }
                }
                setFiles(list); setStatus(`Loaded ${list.length} PDFs`); setIsSidebarOpen(false);
                addToRecent(handle.name);
                setRecentFolders(prev => {
                    const filtered = prev.filter(f => f.name !== handle.name);
                    return [{ name: handle.name, handle }, ...filtered].slice(0, 5);
                });
            };

            const selectFolder = async (existingHandle = null) => {
                try {
                    let handle = existingHandle;
                    if (!handle) handle = await window.showDirectoryPicker({ mode: 'readwrite' });
                    await scanHandle(handle);
                } catch (err) { setStatus('Ready'); }
            };

            const clean = (t) => t.replace(/[\/\:\*\?"<>\|]/g, '').replace(/\s+/g, ' ').trim();

            const extractTitles = async (file) => {
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    const page = await pdf.getPage(1);
                    const textContent = await page.getTextContent();
                    const { height, width } = page.getViewport({ scale: 1.0 });
                    const isLandscape = width > height;
                    const items = textContent.items.map(i => {
                        const fontSize = Math.sqrt(Math.pow(i.transform[0], 2) + Math.pow(i.transform[1], 2));
                        return { text: i.str.trim(), size: fontSize, y: i.transform[5] };
                    }).filter(i => i.text.length > 2);
                    if (items.length === 0) return [{ text: "Scanned Content", score: 10 }];
                    const maxFontSize = Math.max(...items.map(i => i.size)) || 1;
                    let grouped = [];
                    const sortedByDescSize = [...items].sort((a, b) => b.size - a.size);
                    const sizeBuckets = [];
                    sortedByDescSize.forEach(item => {
                        let bucket = sizeBuckets.find(b => Math.abs(b.avgSize - item.size) / b.avgSize < 0.15);
                        if (!bucket) { bucket = { avgSize: item.size, items: [] }; sizeBuckets.push(bucket); }
                        bucket.items.push(item);
                    });
                    sizeBuckets.slice(0, 8).forEach(bucket => {
                        const sizeMatches = bucket.items.sort((a, b) => b.y - a.y);
                        if (sizeMatches.length > 0) {
                            let txt = sizeMatches[0].text, lastY = sizeMatches[0].y, bSize = bucket.avgSize;
                            for (let i = 1; i < sizeMatches.length; i++) {
                                if (Math.abs(sizeMatches[i].y - lastY) < bSize * 3.2) { txt += " " + sizeMatches[i].text; lastY = sizeMatches[i].y; }
                                else { grouped.push({ text: clean(txt), score: calcScore(txt, bSize, maxFontSize, isLandscape, lastY, height) }); txt = sizeMatches[i].text; lastY = sizeMatches[i].y; }
                            }
                            grouped.push({ text: clean(txt), score: calcScore(txt, bSize, maxFontSize, isLandscape, lastY, height) });
                        }
                    });
                    const seen = {};
                    grouped.forEach(g => {
                        const low = g.text.toLowerCase();
                        if (!seen[low] || g.score > seen[low].score) seen[low] = g;
                    });
                    return Object.values(seen).sort((a, b) => b.score - a.score).slice(0, 5);
                } catch (e) { return []; }
            };

            const calcScore = (text, size, max, landscape, y, h) => {
                let s = (size / max) * 55; if (landscape) s += 15;
                const posRatio = y / h; if (posRatio > 0.15 && posRatio < 0.85) s += 15;
                const words = text.split(' ').length;
                if (words >= 4 && words <= 15) s += 20; else if (words < 3) s -= 45;
                const noise = ["pda", "confidential", "draft", "presentation", "copyright", "all rights reserved"];
                if (noise.some(n => text.toLowerCase().includes(n))) s -= 50;
                if (/\b(19|20)\d{2}\b/.test(text)) s -= 20;
                if (/\b(january|february|march|april|may|june|july|august|september|october|november|december)\b/i.test(text)) s -= 20;
                if (/[a-z]/.test(text) && /[A-Z]/.test(text)) s += 10;
                return Math.max(0, Math.min(100, Math.round(s)));
            };

            const toggleSelection = (name) => {
                const next = new Set(selectedPaths);
                if (next.has(name)) next.delete(name); else next.add(name);
                setSelectedPaths(next);
            };

            const updatePreview = async (f) => {
                const file = await f.handle.getFile();
                setPreviewPath(URL.createObjectURL(file));
            };

            const runRename = async () => {
                setActiveModal(null); setStatus('Renaming...');
                const now = new Date();
                const localTime = now.toLocaleString();
                let logContent = `RENAME LOG - ${localTime}\n`;
                logContent += `==========================================\n\n`;
                const toProcess = files.filter(f => selectedPaths.has(f.name) && f.status !== 'Done');
                let actualChangesCount = 0;
                
                for (let f of toProcess) {
                    try {
                        const newName = `${f.detected_title}.pdf`;
                        // Only log and rename if the name actually changed
                        if (newName === f.name) {
                            f.status = 'Done';
                            continue;
                        }

                        if (typeof f.handle.move === 'function') await f.handle.move(newName);
                        else {
                            const newHandle = await dirHandle.getFileHandle(newName, { create: true });
                            const writable = await newHandle.createWritable();
                            await writable.write(await f.handle.getFile()); await writable.close();
                            await dirHandle.removeEntry(f.name);
                        }
                        
                        logContent += `[OK] ${f.name} -> ${newName}\n`;
                        f.status = 'Done'; f.name = newName;
                        actualChangesCount++;
                    } catch (e) { 
                        logContent += `[ERROR] ${f.name} -> ${f.detected_title}.pdf (${e.message})\n`;
                        f.status = 'Error'; 
                    }
                }

                setFiles([...files]); setSelectedPaths(new Set());

                if (saveLog && dirHandle && actualChangesCount > 0) {
                    try {
                        const ts = now.getFullYear() + '-' + (now.getMonth()+1).toString().padStart(2,'0') + '-' + now.getDate().toString().padStart(2,'0') + '_' + now.getHours().toString().padStart(2,'0') + '-' + now.getMinutes().toString().padStart(2,'0');
                        const logName = `rename_log_${ts}.txt`;
                        const logHandle = await dirHandle.getFileHandle(logName, { create: true });
                        const writable = await logHandle.createWritable();
                        await writable.write(logContent); await writable.close();
                        setStatus(`Complete. ${actualChangesCount} files renamed. Log saved.`);
                    } catch (e) { setStatus('Batch complete (Log failed)'); }
                } else {
                    setStatus(`Batch complete. ${actualChangesCount} files changed.`);
                }
            };

            return (
                <div className="h-screen flex flex-col overflow-hidden transition-colors duration-300">
                    <header className="glass border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 px-6 md:px-10 py-5 flex justify-between items-center z-30 shadow-sm">
                        <div className="flex items-center gap-4">
                            <button onClick={() => setIsSidebarOpen(true)} className="md:hidden p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-xl transition-colors"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
                            <div className="bg-indigo-600 p-2.5 rounded-2xl text-white shadow-xl shadow-indigo-100 dark:shadow-none"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
                            <h1 className="text-xl font-black tracking-tighter hidden md:block">Smart Renamer</h1>
                        </div>
                        <div className="flex gap-4 md:gap-8 items-center">
                            <button onClick={() => setActiveModal('settings')} className="p-3 bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 rounded-2xl transition-all group shadow-sm border border-slate-100 dark:border-slate-800"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="group-hover:rotate-90 transition-transform"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
                            <button onClick={() => setActiveModal('confirm')} disabled={selectedFiles.length === 0} className="bg-indigo-600 hover:bg-indigo-700 disabled:bg-slate-100 dark:disabled:bg-slate-800 disabled:text-slate-300 text-white px-8 py-3 rounded-2xl text-xs md:text-sm font-black transition-all shadow-xl active:scale-95 uppercase tracking-widest">Rename ({selectedFiles.length})</button>
                        </div>
                    </header>

                    <main className="flex-1 flex overflow-hidden relative">
                        {isSidebarOpen && <div onClick={() => setIsSidebarOpen(false)} className="md:hidden fixed inset-0 z-40 bg-black/40 backdrop-blur-sm" />}
                        <aside className={`fixed md:relative inset-y-0 left-0 w-72 md:w-80 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 z-50 transform ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'} transition-transform duration-300 flex flex-col h-full shadow-2xl md:shadow-none`}>
                            <div className="p-8 space-y-8 flex-1 overflow-y-auto scroll-smooth">
                                <div>
                                    <label className="block text-[10px] font-black text-slate-400 mb-4 uppercase tracking-[0.2em]">Source Folder</label>
                                    <button onClick={() => selectFolder()} className="w-full bg-indigo-600 text-white py-4 rounded-2xl text-xs font-black uppercase tracking-widest hover:bg-indigo-700 transition-all active:scale-95 shadow-lg shadow-indigo-100 dark:shadow-none">Open Folder</button>
                                </div>
                                {recentFolders.length > 0 && (
                                    <div>
                                        <label className="block text-[9px] font-black text-slate-300 dark:text-slate-600 uppercase tracking-widest mb-4">Recently Processed</label>
                                        <div className="space-y-2">
                                            {recentFolders.map((f, i) => (
                                                <button key={i} onClick={() => selectFolder(f.handle)} className="w-full text-left text-[11px] font-bold text-slate-500 dark:text-slate-400 hover:text-indigo-600 truncate bg-slate-50 dark:bg-slate-800 p-3 rounded-xl border border-slate-100 dark:border-slate-700 transition-all active:scale-95 group flex items-center gap-2">
                                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="opacity-40 group-hover:text-indigo-600 transition-colors"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
                                                    <span className="truncate">{f.name}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                {previewUrl && (
                                    <div className="pt-4 border-t border-slate-100 dark:border-slate-800 sticky top-0 bg-white dark:bg-slate-900 z-10 py-4">
                                        <h3 className="text-[10px] font-black text-slate-400 mb-4 uppercase tracking-widest">Live Preview</h3>
                                        <div onClick={() => setActiveModal('fullscreen')} className="relative border border-slate-100 dark:border-slate-800 rounded-[2.5rem] overflow-hidden shadow-2xl bg-white dark:bg-slate-800 p-1.5 cursor-zoom-in transition-transform hover:scale-[1.02] preview-glow">
                                            <iframe src={previewUrl} className="w-full aspect-[3/4] rounded-[2.2rem] border-0 pointer-events-none" />
                                        </div>
                                    </div>
                                )}
                            </div>
                        </aside>

                        <div className="flex-1 overflow-y-auto p-4 md:p-10 bg-slate-50/50 dark:bg-slate-950/50">
                            {files.length === 0 ? (
                                <div className="py-20 md:py-40 text-center bg-white dark:bg-slate-900 rounded-[3rem] border border-slate-100 dark:border-slate-800 shadow-inner flex flex-col items-center justify-center p-8">
                                    <div className="bg-indigo-50 dark:bg-slate-800 w-24 h-24 rounded-full flex items-center justify-center mb-8 text-indigo-600 font-black text-2xl tracking-tighter shadow-sm">PDF</div>
                                    <h3 className="text-xl font-black mb-2 tracking-tight">Ready to Rename?</h3>
                                    <p className="text-sm font-bold text-slate-300 dark:text-slate-600 uppercase tracking-widest mb-10">Select a folder to begin bulk renaming</p>
                                    <button onClick={() => selectFolder()} className="bg-indigo-600 hover:bg-indigo-700 text-white px-12 py-5 rounded-[2rem] text-sm font-black uppercase tracking-[0.2em] shadow-2xl shadow-indigo-200 dark:shadow-none transition-all active:scale-95">Select PDF Folder</button>
                                </div>
                            ) : (
                                <div className="bg-white dark:bg-slate-900 rounded-[3rem] border border-slate-200 dark:border-slate-800 overflow-hidden shadow-2xl transition-all duration-500">
                                    <table className="w-full text-left border-collapse">
                                        <thead className="bg-slate-50/80 dark:bg-slate-800/80 border-b border-slate-100 dark:border-slate-800">
                                            <tr>
                                                <th className="px-8 py-6 w-12 text-center"><input type="checkbox" className="w-5 h-5 rounded-lg border-slate-300 dark:border-slate-700 bg-transparent text-indigo-600 focus:ring-indigo-500" onChange={() => setSelectedPaths(selectedFiles.length === files.length ? new Set() : new Set(files.map(f => f.name)))} checked={files.length > 0 && selectedFiles.length === files.length} /></th>
                                                <th className="px-4 py-6 text-[10px] font-black text-slate-300 uppercase tracking-widest">Metadata</th>
                                                <th className="px-8 py-6 text-[10px] font-black text-slate-300 uppercase tracking-widest">Calculated Title</th>
                                                <th className="px-8 py-6 w-20 text-center">View</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50 dark:divide-slate-800">
                                            {files.map((file, idx) => {
                                                const isDone = file.status === 'Done', isSelected = selectedPaths.has(file.name), bestScore = file.candidates[0]?.score || 0;
                                                return (
                                                <tr key={idx} className={`${isSelected ? 'bg-indigo-50/30 dark:bg-indigo-900/10' : 'hover:bg-slate-50/20 dark:hover:bg-slate-800/20'} transition-all`}>
                                                    <td className="px-8 py-6 align-top text-center"><input type="checkbox" disabled={isDone} checked={isSelected} onChange={() => toggleSelection(file.name)} className="w-5 h-5 rounded-lg border-slate-300 dark:border-slate-700 bg-transparent text-indigo-600" /></td>
                                                    <td className="px-4 py-6 align-top font-bold text-slate-400 truncate max-w-[180px]">{file.name}</td>
                                                    <td className="px-8 py-6">
                                                        <div className="flex flex-col gap-4">
                                                            <div className="flex items-center gap-4">
                                                                <input className={`flex-1 bg-transparent border-b-2 border-transparent focus:border-indigo-400 outline-none font-black text-sm py-1 transition-all ${isDone ? 'text-emerald-500' : 'text-slate-900 dark:text-white'}`} value={file.detected_title} onChange={(e) => { const n = [...files]; n[idx].detected_title = e.target.value; setFiles(n); }} disabled={isDone} />
                                                                {!isDone && <span className={`px-2.5 py-1 rounded-lg border text-[9px] font-black uppercase ${bestScore >= 80 ? 'bg-emerald-50 text-emerald-700 border-emerald-100' : 'bg-amber-50 text-amber-600 border-amber-100'}`}>{bestScore}%</span>}
                                                            </div>
                                                            {!isDone && file.candidates.length > 1 && (
                                                                <div className="flex flex-wrap gap-2">
                                                                    {file.candidates.slice(1).map((c, ci) => <button key={ci} onClick={() => { const n = [...files]; n[idx].detected_title = formatTitle(c.text); setFiles(n); }} className="text-[10px] font-bold text-slate-400 hover:text-indigo-600 transition-colors bg-slate-50 dark:bg-slate-800 px-3 py-1 rounded-full border border-slate-100 dark:border-slate-700 shadow-sm active:scale-90">{c.text} ({c.score}%)</button>)}
                                                                </div>
                                                            )}
                                                        </div>
                                                    </td>
                                                    <td className="px-8 py-6 align-top text-center"><button onClick={() => updatePreview(file)} className="p-2.5 text-slate-300 hover:text-indigo-600 hover:bg-white dark:hover:bg-slate-700 rounded-xl active:scale-90 transition-all shadow-sm border border-transparent hover:border-slate-100"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button></td>
                                                </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                        </div>
                    </main>

                    <SettingsModal isOpen={activeModal === 'settings'} onClose={() => setActiveModal(null)} config={config} setConfig={setConfig} />
                    <ConfirmModal isOpen={activeModal === 'confirm'} files={selectedFiles} saveLog={saveLog} setSaveLog={setSaveLog} onConfirm={runRename} onCancel={() => setActiveModal(null)} />
                    <FullscreenPreview isOpen={activeModal === 'fullscreen'} path={previewUrl} onClose={() => setActiveModal(null)} />
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
